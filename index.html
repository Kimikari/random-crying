<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
/* global nn*/
function draw (){
  let x = nn.random(nn.width)
  let y = nn.random(nn.height)
  nn.create('a-box')
  .content('😭')
  .position(x,y)
  .scale(nn.random(2,5))
  .hueRotate(nn.random(360))
  .rotate(nn.random(360))
  .addTo('body')
  }

  nn.times(100,draw)
  
</script>
